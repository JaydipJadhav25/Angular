<h1>Resuable Card</h1>

<div class="box">
  @for (item of data; track $index) {
    <app-cards [id]="item.id" [title]="item.title" [disc]="item.description"> 
      <p>this is index {{$index}}</p>
    </app-cards>
  }
</div>



<h1>Resuable Button</h1>
<p>{{message}}</p>
<app-button [lable]="'submitte'" (clickFunction)="onSave($event)"></app-button>



<h1>Resuable Form</h1>
<p>Name : {{value}}</p>

<app-resuable-form
 [lable]="'name'"
 [type]="'text'"
 (valueChnage)="onChnageInput($event)"
 ></app-resuable-form>
